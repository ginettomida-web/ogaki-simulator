<!DOCTYPE html>
<html class="light" lang="ja">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#2563eb", "background-light": "#f8fafd", "background-dark": "#0f172a" },
                    fontFamily: { "display": ["Public Sans", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
    <title>大垣市情報工房利用料金シミュレーター</title>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- Sidebar Navigation -->
        <aside
            class="hidden lg:flex lg:w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex-col z-20">
            <div class="p-6 flex items-center gap-3">
                <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">analytics</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight">大垣市情報工房</h1>
            </div>
            <nav class="flex-1 px-4 space-y-2" id="sidebar-nav">
                <a href="#simulator" data-target="simulator-view"
                    class="nav-btn flex items-center gap-3 px-4 py-3 rounded-xl bg-primary/10 text-primary font-bold transition-colors">
                    <span class="material-symbols-outlined">calculate</span>
                    <span>料金シミュレーター</span>
                </a>
            </nav>
            <div class="p-4 mt-auto border-t border-slate-200 dark:border-slate-800">
                <div class="p-2 space-y-2">
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest text-center">Public Calculator v2.0</p>
                    <a href="legal.html" class="block text-[10px] text-slate-400 hover:text-primary text-center transition-colors">利用規約・免責事項</a>
                </div>
            </div>
        </aside>

        <!-- Main Content (Relative for absolute children) -->
        <main class="flex-1 flex flex-col overflow-x-hidden relative bg-slate-50 dark:bg-slate-950">

            <!-- ====== SIMULATOR VIEW ====== -->
            <div id="simulator-view" class="absolute inset-0 overflow-y-auto transition-opacity duration-300 z-10">
                <header
                    class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
                    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-2 lg:px-8 lg:py-3">
                        <div class="flex items-center gap-2 lg:gap-3">
                            <div class="flex h-8 w-8 lg:h-10 lg:w-10 items-center justify-center rounded-lg lg:rounded-xl bg-primary text-white">
                                <span class="material-symbols-outlined text-sm lg:text-base">calculate</span>
                            </div>
                            <div>
                                <h1
                                    class="text-sm lg:text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-white">
                                    料金シミュレーター</h1>
                                <p class="hidden lg:block text-xs font-medium text-slate-500 dark:text-slate-400">リアルタイム見積もり</p>
                            </div>
                        </div>
                        <div class="flex lg:hidden">
                            <a href="legal.html" class="text-[10px] font-bold text-slate-400 hover:text-primary transition-colors border border-slate-200 dark:border-slate-800 rounded-full px-3 py-1">利用規約</a>
                        </div>
                    </div>
                </header>
                <div class="mx-auto flex w-full max-w-7xl flex-1 flex-col gap-6 p-4 lg:flex-row lg:p-8">
                    <aside class="w-full lg:w-1/4">
                        <div class="sticky top-24 flex flex-col gap-4">
                            <div
                                class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 shadow-sm">
                                <nav class="flex flex-col gap-1">
                                    <a class="flex items-center gap-3 rounded-xl bg-primary/10 px-3 py-2 text-primary"
                                        href="#section-room">
                                        <span class="material-symbols-outlined">corporate_fare</span><span
                                            class="text-sm font-bold">施設選択</span>
                                    </a>
                                </nav>
                                <div class="mt-6 border-t border-slate-100 dark:border-slate-800 pt-4">
                                    <button id="reset-inputs-btn"
                                        class="flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                                        <span class="material-symbols-outlined text-base">restart_alt</span>入力をリセット
                                    </button>
                                </div>
                            </div>
                        </div>
                    </aside>
                    <section class="flex flex-1 flex-col gap-8">

                        <!-- Room Selection -->
                        <div class="rounded-2xl bg-white dark:bg-slate-900 p-6 shadow-sm border border-slate-200 dark:border-slate-800"
                            id="section-room">
                            <h2 class="flex items-center gap-2 text-lg font-bold text-slate-900 dark:text-white mb-6">
                                <span class="material-symbols-outlined text-primary">corporate_fare</span>
                                施設を選択してください
                            </h2>
                            <div class="grid grid-cols-2 lg:grid-cols-3 gap-3" id="room-buttons">
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="スインクホール">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">スインクホール</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 452人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="セミナー室">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">セミナー室</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 80人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="研修室">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">研修室</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 12人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="多目的研修室">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">多目的研修室</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 50人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="会議室１">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">会議室１</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 12人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="会議室２">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">会議室２</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 12人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="会議室３">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">会議室３</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 36人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="会議室４">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">会議室４</span>
                                    <span class="text-[10px] text-slate-500 uppercase">定員: 60人</span>
                                </button>
                                <button
                                    class="sim-room-btn flex flex-col gap-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 p-4 text-left hover:border-slate-300 dark:hover:border-slate-700 transition-all"
                                    data-room="創作コーナー">
                                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">創作コーナー</span>
                                    <span class="text-[10px] text-slate-500 uppercase">時間貸し</span>
                                </button>
                            </div>
                        </div>

                        <!-- Dynamic Room Configurations Container -->
                        <div id="room-configs-container" class="flex flex-col gap-8">
                            <!-- JS will dynamically inject configuration blocks for each room here -->
                        </div>
                    </section>
                    <aside class="w-full lg:w-1/3">
                        <div class="sticky top-24 flex flex-col gap-6">
                            <div
                                class="rounded-2xl bg-white dark:bg-slate-900 shadow-xl border border-primary/20 overflow-hidden">
                                <div class="bg-primary px-6 py-4 text-white">
                                    <h2 class="text-lg font-bold">見積明細（概算）</h2>
                                </div>
                                <div class="p-6">
                                    <div class="space-y-4">
                                        <div
                                            class="flex flex-col gap-1 border-b border-slate-100 dark:border-slate-800 pb-3">
                                            <span class="text-xs font-bold text-slate-500 uppercase">施設</span>
                                            <span class="text-sm font-bold" id="sim-room-name">未選択</span>
                                        </div>
                                        <div class="space-y-2 text-sm" id="sim-details-list">
                                        </div>
                                        <div
                                            class="mt-6 flex flex-col items-end gap-1 border-t-2 border-dashed border-slate-200 dark:border-slate-800 pt-4">
                                            <span class="text-xs font-bold text-slate-500">合計金額 (税込)</span>
                                            <span class="text-4xl font-extrabold text-primary"
                                                id="sim-total-price">¥0</span>
                                        </div>
                                    </div>
                                    <div class="mt-8 flex flex-col gap-3">
                                        <p class="text-[10px] text-slate-400 text-center">表示価格は税込の概算であり、実際の請求額と異なる場合があります。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            </div>

            <!-- View Container End -->
        </main>
    </div>

    <script src="app.js?v=20240313"></script>
</body>

</html>
